<html>
    <body>
    <svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="200px" height="200px" viewBox="0 0 300 300" style="display: block; margin: auto; max-width: 100%;">

    <use xlink:href="#bg-rect"></use>

    <g id="logo-rotation-group">
        <g id="bg-circles-group">
            <circle id="c1" cx="150" cy="110" r="50" fill="#93b7a5" opacity="0.65"></circle>
            <circle id="c2" cx="115" cy="170" r="50" fill="#8bb5c7" opacity="0.65"></circle>
            <circle id="c3" cx="185" cy="170" r="50" fill="#c4daea" opacity="0.65"></circle>
        </g>

        <g id="spokes-structure-group">
            <g id="spokes-lines-group">
                <line id="s1" x1="150" y1="150" x2="150" y2="110" stroke="#c5ab73" stroke-width="6"></line>
                <line id="s2" x1="150" y1="150" x2="115" y2="170" stroke="#c5ab73" stroke-width="6"></line>
                <line id="s3" x1="150" y1="150" x2="185" y2="170" stroke="#c5ab73" stroke-width="6"></line>
            </g>
            
            <circle id="o1" cx="150" cy="110" r="16" fill="lightyellow"></circle>
            <circle id="o2" cx="115" cy="170" r="16" fill="lightyellow"></circle>
            <circle id="o3" cx="185" cy="170" r="16" fill="lightyellow"></circle>
            
            <circle id="center-sphere" cx="150" cy="150" r="12" fill="#c5ab73"></circle>
        </g>
    </g>

    <style type="text/css">
        /* Sychronized animations for everything over 10s loop */
        
        /* Rotation (Master Group) */
        @keyframes rotate-sync {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        #logo-rotation-group {
            transform-origin: 150px 150px;
            animation: rotate-sync 2s linear infinite;
        }

        /* Collapse/Expand for Background Circles &amp; Spheres */
        /* They all use the same timeline structure and synchronize */

        /* General Keyframes structure for movement &amp; scale:
           0%-10%: Static Original
           10%-45%: Collapse (movement to center + scaling down)
           45%-55%: Pause (static collapsed, rotating)
           55%-90%: Expand (movement back out + scaling up)
           90%-100%: Back to original static
        */

        /* Background Circles Animations */
        /* origins are centers for scale, and movement is calculate to center 150,150 */
        @keyframes collapse-expand-c1 {
            0%, 10%, 100% { transform: translate(0, 0) scale(1); }
            45%, 55% { transform: translate(0, 40px) scale(0.6); } /* (150-150=0, 150-110=40), scale to ~30r/50r = 0.6 */
            90% { transform: translate(0, 0) scale(1); }
        }
        #c1 {
            transform-origin: 150px 110px;
            animation: collapse-expand-c1 4s ease-in infinite;
        }

        @keyframes collapse-expand-c2 {
            0%, 10%, 100% { transform: translate(0, 0) scale(1); }
            45%, 55% { transform: translate(35px, -20px) scale(0.6); } /* (150-115=35, 150-170=-20), scale 0.6 */
            90% { transform: translate(0, 0) scale(1); }
        }
        #c2 {
            transform-origin: 115px 170px;
            animation: collapse-expand-c2 4s ease-in infinite;
        }

        @keyframes collapse-expand-c3 {
            0%, 10%, 100% { transform: translate(0, 0) scale(1); }
            45%, 55% { transform: translate(-35px, -20px) scale(0.6); } /* (150-185=-35, 150-170=-20), scale 0.6 */
            90% { transform: translate(0, 0) scale(1); }
        }
        #c3 {
            transform-origin: 185px 170px;
            animation: collapse-expand-c3 4s ease-in infinite;
        }

        @keyframes shrink-extend-spokes-lines {
            0%, 10%, 100% { transform: scale(1); }
            45%, 55% { transform: scale(0.1); } /* Scale to 0.1, making them very short inside center sphere */
            90% { transform: scale(1); }
        }
        #spokes-lines-group {
            transform-origin: 150px 150px;
            /* animation: shrink-extend-spokes-lines 2s linear infinite; */
        }

        @keyframes collapse-expand-o1 {
            0%, 10%, 100% { transform: translate(0, 0) scale(1); }
            45%, 55% { transform: translate(0, 40px) scale(0.75); } /* movement vector is same as C1 */
            90% { transform: translate(0, 0) scale(1); }
        }
        #o1 {
            transform-origin: 150px 110px;
        }
    </style>
    </svg>
</body>
</html>
